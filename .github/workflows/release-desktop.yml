name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（与 VERSION 一致，如 2026.07.6）'
        required: true
        type: string
      create_release:
        description: '创建 GitHub Release 并上传安装包'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  # 禁止 electron-builder 在 CI 中隐式发布到 GitHub（由 release job 统一上传）
  ELECTRON_BUILDER_PUBLISH: never

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "无法解析版本号" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag: $TAG)"

  build-mac:
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Sync version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "$VERSION" > VERSION
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (${{ matrix.arch }})
        run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            dist-electron/*.dmg
          if-no-files-found: error

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Sync version
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          echo "$VERSION" > VERSION
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-builder --win nsis zip --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist-electron/*.exe
            dist-electron/*.zip
          if-no-files-found: error

  release:
    needs: [prepare, build-mac, build-windows]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}" --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: 无限画布 ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          body: |
            ## 无限画布 ${{ needs.prepare.outputs.version }}

            ### 下载安装包

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Apple Silicon) | `*-arm64.dmg` | M 系列芯片 |
            | macOS (Intel) | `*-x64.dmg` 或 `*-mac.dmg` | Intel 芯片 |
            | Windows | `*.exe` | NSIS 安装程序（推荐） |
            | Windows | `*.zip` | 便携压缩包 |

            首次启动会自动检测/安装 Python 与依赖（国内镜像），无需手动配置。

            详细说明见 [DESKTOP.md](https://github.com/${{ github.repository }}/blob/main/DESKTOP.md)。
          files: release-assets/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
