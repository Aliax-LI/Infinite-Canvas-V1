name: Test Desktop

on:
  push:
  pull_request:

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest backend/tests/unit -q

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest backend/tests/integration -q

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build:frontend
      - run: npm run test -w frontend
      - run: npm run validate-i18n -w frontend

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: python -m pip install -e ".[dev]"
      - run: npx playwright install-deps chromium
      - run: xvfb-run --auto-servernum npm run test:electron
        env:
          INFINITE_CANVAS_TEST: "1"

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: python -m pip install -e ".[dev]"
      - run: npm run test:security

  gates:
    runs-on: ubuntu-latest
    needs: [backend-unit, backend-integration, frontend-unit, e2e, security]
    steps:
      - run: echo "All desktop gates passed"
