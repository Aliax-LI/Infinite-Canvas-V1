name: Test Desktop

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: npm ci
      - run: python -m pip install -e ".[dev]"
      - run: npm run build:frontend
      - run: npm run test:all
