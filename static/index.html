<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/logo.png" type="image/png">
    <title>AI Studio</title>
    <style>
        html.studio-route-booting body {
            visibility: hidden !important;
        }
    </style>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
                document.documentElement.classList.add('studio-route-booting');
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.6.1783517078"></script>
    <script src="/static/js/theme.js?v=2026.07.6.1783517078"></script>
    <script src="/static/js/i18n.js?v=2026.07.6.1783517078"></script>
    <style>
        @import url('/static/vendor/css/fonts.css?v=2026.07.6.1783517078');

        /* 本地 Tailwind 工具类兜底：CDN 慢/未就绪时也能立刻给图标尺寸，避免首屏左侧栏空白 */
        .w-1\.5 { width: 0.375rem; }
        .h-1\.5 { height: 0.375rem; }
        .w-4 { width: 1rem; }
        .h-4 { height: 1rem; }
        .w-5 { width: 1.25rem; }
        .h-5 { height: 1.25rem; }
        .flex-shrink-0 { flex-shrink: 0; }
        .rounded-full { border-radius: 0; }
        .mb-12 { margin-bottom: 3rem; }
        .transition-colors { transition-property: color, background-color, border-color, fill, stroke; transition-duration: 150ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pulse { animation: studio-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes studio-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        :root {
            --accent: #000000;
            --fluid-ease: cubic-bezier(0.3, 0, 0, 1);
            --bg: #f7f7f8;
            --sidebar-bg: #f7f7f8;
            --stage-bg: #f7f7f8;
            --radius: 0;
            --border: #e8e8ea;
            --stage-border: #e8e8ea;
            --text: #121212;
            --muted: #999;
            --nav-hover-bg: #fafafa;
            --monitor-bg: rgba(255, 255, 255, 0.7);
            --monitor-border: rgba(0, 0, 0, 0.05);
            --monitor-shadow: rgba(0, 0, 0, 0.04);
            --divider: rgba(0, 0, 0, 0.1);
            --scrollbar: #d8d8d8;
            --scrollbar-hover: #c0c0c0;
        }

        html.theme-dark,
        body.theme-dark {
            --bg: #0f141d;
            --sidebar-bg: #0f141d;
            --stage-bg: #0f141d;
            --border: #242d3b;
            --stage-border: #2a3444;
            --text: #e5e9f0;
            --muted: #8f9aab;
            --nav-hover-bg: #171d29;
            --monitor-bg: rgba(23, 29, 41, 0.82);
            --monitor-border: rgba(255, 255, 255, 0.08);
            --monitor-shadow: rgba(0, 0, 0, 0.3);
            --divider: rgba(255, 255, 255, 0.15);
            --scrollbar: #334155;
            --scrollbar-hover: #475569;
        }

        /* 极简滚动条 */
        html,
        body {
            overscroll-behavior: auto;
            height: 100%;
            overflow: hidden;
        }

        *::-webkit-scrollbar {
            width: 10px !important;
            height: 10px !important;
            background: transparent !important;
        }

        *::-webkit-scrollbar-track {
            background: transparent !important;
            border: none !important;
        }

        *::-webkit-scrollbar-thumb {
            background-color: var(--scrollbar) !important;
            border: 3px solid transparent !important;
            border-right-width: 3px !important;
            background-clip: padding-box !important;
            border-radius: 0 !important;
            min-height: 36px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--scrollbar-hover) !important;
        }

        *::-webkit-scrollbar-corner {
            background: transparent !important;
        }

        * {
            scrollbar-width: thin !important;
            scrollbar-color: var(--scrollbar) transparent !important;
        }

        body {
            background: var(--bg);
            font-family: var(--font-sans);
            overflow: hidden;
            height: 100vh;
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            min-height: 0;
            background: var(--bg);
            position: relative;
            transition: background 0.3s;
        }

        /* 侧边栏 */
        .sidebar {
            width: 72px;
            min-width: 72px;
            height: 100vh;
            max-height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border);
            padding: 16px 0;
            transition: width 0.5s var(--fluid-ease) 0.5s, background 0.3s, border-color 0.3s;
            z-index: 50;
            overflow: hidden;
        }

        .sidebar:hover {
            width: 220px;
            transition-delay: 0s;
        }

        body.studio-scale-host .sidebar {
            height: calc(100vh / var(--studio-ui-scale, 1));
            max-height: calc(100vh / var(--studio-ui-scale, 1));
            zoom: var(--studio-ui-scale, 1);
        }

        /* 首次加载时与 iframe 的 0.5s 淡入同步播放，避免侧栏"焊死"在原地造成视觉断层 */
        @keyframes sidebar-enter {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        html:not(.studio-route-booting) .sidebar {
            animation: sidebar-enter 0.5s var(--fluid-ease);
        }

        .logo-ring {
            width: 36px;
            height: 36px;
            border: 2px solid var(--text);
            border-radius: 0;
            background: transparent;
            padding: 0;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex: 0 0 auto;
            /* 仅保留 hover 真正会用到的属性过渡，避免 transition: all 因首屏属性补齐被意外触发 */
            transition: transform 0.6s var(--fluid-ease) 0.5s, border-radius 0.6s var(--fluid-ease) 0.5s, border-color 0.3s, background-color .18s, box-shadow .2s;
        }

        .sidebar:hover .logo-ring {
            transform: rotate(90deg);
            border-radius: 50%;
            transition-delay: 0s;
        }

        .logo-ring:hover,
        .logo-ring:focus-visible {
            background: var(--nav-hover-bg);
            border-color: var(--text);
            box-shadow: 0 0 0 4px rgba(148, 163, 184, .16), 0 10px 24px rgba(15, 23, 42, .08);
            outline: none;
        }

        .logo-ring:hover #logo-dot,
        .logo-ring:focus-visible #logo-dot {
            transform: scale(1.8);
        }

        .logo-ring:active {
            transform: scale(.94);
            transition-delay: 0s;
        }

        .sidebar:hover .logo-ring:active {
            transform: rotate(90deg) scale(.94);
        }

        #logo-dot {
            transition: transform .16s ease, background-color .16s ease, box-shadow .16s ease;
        }

        /* 导航项 */
        .nav-item {
            position: relative;
            width: 48px;
            height: 48px;
            flex: 0 0 48px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-radius: 0;
            cursor: pointer;
            /* 只对 width 做带延迟的过渡（侧栏悬停展开效果）；background/color 不参与过渡，避免 active 切换时底色"流动" */
            transition: width 0.3s var(--fluid-ease) 0.5s;
            color: var(--muted);
            overflow: hidden;
            padding-left: 14px;
        }

        .sidebar:hover .nav-item {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-item:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff;
        }

        html.theme-dark .nav-item.active,
        body.theme-dark .nav-item.active {
            background: #f1f5f9;
            color: #0f172a;
        }

        .nav-text {
            opacity: 0;
            margin-left: 16px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: opacity 0.3s 0.5s;
        }

        .sidebar:hover .nav-text {
            opacity: 1;
            transition-delay: 0.1s;
        }

        .nav-fold-toggle {
            position: relative;
            width: 48px;
            height: 36px;
            flex: 0 0 36px;
            margin: 0 0 6px;
            padding-left: 14px;
            border: 1px solid var(--border);
            border-radius: 0;
            background: transparent;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            overflow: hidden;
            transition: width 0.3s var(--fluid-ease) 0.5s, background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        .sidebar:hover .nav-fold-toggle {
            width: 190px;
            transition-delay: 0s;
        }

        .nav-fold-toggle:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .nav-fold-icon {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
            transition: transform 0.25s var(--fluid-ease);
        }

        .nav-fold-toggle[aria-expanded="false"] .nav-fold-icon {
            transform: rotate(-90deg);
        }

        .nav-fold-group {
            width: 100%;
            flex: 0 0 auto;
            max-height: 720px;
            opacity: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: max-height 0.3s var(--fluid-ease), opacity 0.2s ease;
        }

        .nav-fold-group.is-collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .nav-section-label {
            width: 48px;
            margin: 2px 0 4px;
            padding-left: 14px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            opacity: 0;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.3s 0.5s, width 0.3s var(--fluid-ease) 0.5s;
        }

        .sidebar:hover .nav-section-label,
        .sidebar.is-pinned .nav-section-label {
            width: 190px;
            opacity: .72;
            transition-delay: 0.1s;
        }

        .nav-divider {
            width: 32px;
            height: 1px;
            background: var(--border);
            margin: 8px auto;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .mobile-menu-btn {
            display: none;
            position: absolute;
            top: 18px;
            left: 18px;
            z-index: 60;
            width: 42px;
            height: 42px;
            border-radius: 0;
            border: 1px solid var(--stage-border);
            background: var(--sidebar-bg);
            color: var(--text);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
        }

        .mobile-menu-btn svg { width: 20px; height: 20px; }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .42);
            z-index: 45;
            opacity: 0;
            pointer-events: none;
            transition: opacity .22s ease;
        }

        .sidebar-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: inline-flex; }
            .sidebar-backdrop { display: block; }
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                transform: translateX(-100%);
                width: 240px !important;
                min-width: 240px;
                transition: transform .28s var(--fluid-ease), background .3s, border-color .3s;
                box-shadow: 18px 0 48px rgba(15, 23, 42, .16);
            }
            .sidebar.mobile-open {
                transform: translateX(0);
            }
            .sidebar .nav-item,
            .sidebar .nav-section-label,
            .sidebar .side-pill {
                width: 196px !important;
            }
            .sidebar .nav-text,
            .sidebar .nav-section-label,
            .sidebar .side-pill-text {
                opacity: 1 !important;
                max-width: 140px !important;
            }
            .sidebar .side-pill { gap: 8px !important; }
            .stage { margin: 12px 12px 12px 56px; }
            body.studio-scale-host .stage {
                margin: max(8px, calc(12px * var(--studio-ui-scale, 1))) max(8px, calc(12px * var(--studio-ui-scale, 1))) max(8px, calc(12px * var(--studio-ui-scale, 1))) max(44px, calc(56px * var(--studio-ui-scale, 1)));
            }
        }

        .sidebar nav {
            width: 100%;
            min-height: 0;
            flex: 1 1 auto;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 6px;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, .34) transparent;
        }

        .sidebar::-webkit-scrollbar { width: 4px !important; }
        .sidebar::-webkit-scrollbar-track { background: transparent !important; }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, .34) !important;
            border: 0 !important;
            border-radius: 0 !important;
        }

        .sidebar nav::-webkit-scrollbar { width: 4px !important; }
        .sidebar nav::-webkit-scrollbar-track { background: transparent !important; }
        .sidebar nav::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, .34) !important;
            border: 0 !important;
            border-radius: 0 !important;
        }

        .sidebar nav > * {
            flex-shrink: 0;
        }

        /* 主舞台区 */
        .stage {
            flex: 1;
            background: var(--bg);
            margin: 0;
            border-radius: 0;
            overflow: hidden;
            border: none;
            border-left: 1px solid var(--border);
            position: relative;
            transition: background 0.3s, border-color 0.3s;
        }

        body.studio-scale-host .stage {
            margin: 0;
            border-radius: 0;
        }

        /* Settings: flat unified surface, no nested chrome */
        .stage.is-settings {
            background: var(--bg);
            border-radius: 0;
            border: none;
            margin: 0;
            box-shadow: none;
        }

        body.studio-scale-host .stage.is-settings {
            margin: 0;
            border-radius: 0;
        }

        html.theme-dark .stage.is-settings,
        body.theme-dark .stage.is-settings {
            background: var(--bg);
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transform: scale(1.02);
            filter: blur(4px);
            transition: all 0.5s var(--fluid-ease);
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
            pointer-events: auto;
        }

        /* 左下角监视器 */
        .nano-monitor {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--monitor-bg);
            backdrop-filter: blur(12px);
            padding: 7px 12px;
            border-radius: 0;
            border: 1px solid var(--monitor-border);
            box-shadow: 0 4px 20px var(--monitor-shadow);
            font-family: var(--font-mono);
            transition: all 0.4s var(--fluid-ease);
        }

        .nano-monitor.is-busy {
            background: #000;
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-group:first-child {
            gap: 8px;
        }

        .nano-monitor.is-busy .stat-group {
            color: #fff;
        }

        .divider {
            width: 1px;
            height: 12px;
            background: var(--divider);
        }

        .is-busy .divider {
            background: rgba(255, 255, 255, 0.2);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            margin-right: 2px;
            flex: 0 0 auto;
        }

        .spinner-nano {
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .is-busy .spinner-nano { display: block; }
        .is-busy .pulse-dot { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .label-nano {
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            font-size: 9px;
        }

        .side-actions {
            margin-top:auto;
            margin-bottom:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            width:100%;
            flex:0 0 auto;
        }

        .side-pill {
            width:44px;
            height:36px;
            border-radius: 0;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* 只过渡 hover/激活会改的属性，避免 all 触发延迟 */
            transition: width 0.3s var(--fluid-ease) 0.5s, gap 0.3s var(--fluid-ease) 0.5s, background-color 0.2s, color 0.2s, border-color 0.2s;
            flex-shrink: 0;
            overflow:hidden;
            gap:8px;
            position:relative;
        }

        .sidebar:hover .side-pill {
            width: 170px;
            transition-delay: 0s;
        }

        .side-pill:hover {
            background: var(--nav-hover-bg);
            color: var(--text);
            border-color: var(--stage-border);
        }

        .side-pill.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .side-pill.update-available {
            border-color:#22c55e;
            color:#16a34a;
            overflow:visible;
        }

        html.theme-dark .side-pill.update-available,
        body.theme-dark .side-pill.update-available {
            border-color:#86efac;
            color:#86efac;
        }

        .side-pill.update-available::after {
            content:"NEW";
            position:absolute;
            top:-7px;
            right:-9px;
            min-width:28px;
            height:16px;
            padding:0 5px;
            border-radius: 0;
            background:#22c55e;
            display:flex;
            align-items:center;
            justify-content:center;
            color:#fff;
            font-size:9px;
            font-weight:900;
            letter-spacing:.02em;
            box-shadow:0 6px 16px rgba(34,197,94,.28), 0 0 0 3px rgba(34,197,94,.12);
            pointer-events:none;
        }

        html.theme-dark .side-pill.update-available::after,
        body.theme-dark .side-pill.update-available::after {
            background:#4ade80;
            color:#052e16;
            box-shadow:0 6px 16px rgba(74,222,128,.22), 0 0 0 3px rgba(74,222,128,.12);
        }

        .side-pill svg { width: 16px; height: 16px; flex:0 0 auto; }
        .settings-fold-chevron {
            width: 13px !important;
            height: 13px !important;
            margin-left: -2px;
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s, transform .22s var(--fluid-ease);
        }
        .sidebar:hover .settings-fold-chevron,
        .sidebar.is-pinned .settings-fold-chevron {
            opacity: .72;
            max-width: 16px;
            transition-delay: .15s, .15s, 0s;
        }
        .settings-fold-toggle[aria-expanded="true"] .settings-fold-chevron {
            transform: rotate(180deg);
        }
        .settings-fold-group {
            width: 100%;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            transition: max-height .28s var(--fluid-ease), opacity .18s ease;
        }
        .settings-fold-group:not(.is-collapsed) {
            max-height: 132px;
            opacity: 1;
            pointer-events: auto;
        }
        .side-pill-text {
            opacity:0;
            max-width:0;
            font-size:12px;
            font-weight:800;
            letter-spacing:.02em;
            white-space:nowrap;
            overflow:hidden;
            transition: opacity 0.3s 0.5s, max-width 0.3s var(--fluid-ease) 0.5s;
        }
        .sidebar:hover .side-pill-text {
            opacity:1;
            max-width:120px;
            transition-delay:.15s;
        }
        /* 折叠态去除 gap，避免图标被推偏 */
        .side-pill { gap:0; }
        .sidebar:hover .side-pill { gap:8px; }

        .project-version-badge {
            width:44px;
            min-height:18px;
            padding:0 4px;
            border-radius: 0;
            border:1px solid var(--border);
            background:var(--nav-hover-bg);
            color:var(--muted);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:9px;
            font-weight:800;
            line-height:1;
            white-space:nowrap;
            overflow:hidden;
            cursor:pointer;
            transition:width 0.3s var(--fluid-ease) 0.5s, color .2s, border-color .2s, background-color .2s;
        }
        .project-version-badge:hover { color:var(--text); border-color:var(--accent, #6366f1); }
        .project-version-badge.checking { opacity:.6; animation:badge-pulse 1s ease-in-out infinite; }
        @keyframes badge-pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }

        .sidebar:hover .project-version-badge {
            width:170px;
            transition-delay:0s;
        }

        .project-version-full { display:none; }
        .sidebar:hover .project-version-compact { display:none; }
        .sidebar:hover .project-version-full { display:inline; }

    <script>
        function generateUUID() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) { }
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }
        const CID = localStorage.getItem("client_id") || generateUUID();
        localStorage.setItem("client_id", CID);
        const ACTIVE_PAGE_KEY = 'studio_active_page';
        const SETTINGS_TAB_KEY = 'studio_settings_tab';
        const SIDEBAR_PINNED_KEY = 'studio_sidebar_pinned';
        const DEFAULT_PAGE_ID = 'canvas';
        const PRIMARY_PAGE_IDS = ['canvas','online','gpt-chat','tools','settings'];
        const TOOL_PAGE_IDS = ['zimage','enhance','klein','angle','asset-manager'];
        const PAGE_IDS = PRIMARY_PAGE_IDS.concat(TOOL_PAGE_IDS);
        const LEGACY_SETTINGS_MAP = { 'api-settings':'api', 'comfyui-settings':'workflow' };
        const PROJECT_URL = 'https://github.com/Aliax-LI/Infinite-Canvas-V1';
        const PROJECT_VERSION_URL = 'https://raw.githubusercontent.com/Aliax-LI/Infinite-Canvas-V1/main/VERSION';
        const PROJECT_TREE_URL = 'https://api.github.com/repos/Aliax-LI/Infinite-Canvas-V1/git/trees/main?recursive=1';
        const PROJECT_UPDATE_NOTES_URL = 'https://raw.githubusercontent.com/Aliax-LI/Infinite-Canvas-V1/main/static/update-notes.json';
        let appInfo = { version:'', repo_url:PROJECT_URL, version_url:PROJECT_VERSION_URL, tree_url:PROJECT_TREE_URL };

        function mergeAppInfo(info = {}) {
            const merged = { ...appInfo, ...info };
            merged.repo_url = PROJECT_URL;
            merged.version_url = String(merged.version_url || '').includes('Aliax-LI/Infinite-Canvas-V1')
                ? merged.version_url
                : PROJECT_VERSION_URL;
            merged.tree_url = String(merged.tree_url || '').includes('Aliax-LI/Infinite-Canvas-V1')
                ? merged.tree_url
                : PROJECT_TREE_URL;
            const sources = { ...(merged.sources || {}) };
            const github = { ...(sources.github || {}) };
            github.repo_url = PROJECT_URL;
            if (!String(github.version_url || '').includes('Aliax-LI/Infinite-Canvas-V1')) github.version_url = PROJECT_VERSION_URL;
            if (!String(github.tree_url || '').includes('Aliax-LI/Infinite-Canvas-V1')) github.tree_url = PROJECT_TREE_URL;
            if (!String(github.update_notes_url || '').includes('Aliax-LI/Infinite-Canvas-V1')) github.update_notes_url = PROJECT_UPDATE_NOTES_URL;
            sources.github = github;
            merged.sources = sources;
            appInfo = merged;
            return merged;
        }
        let updateConnectivityResult = null;
        let projectUpdateRunning = false;
        let projectUpdateAbort = null;  // 当前更新请求的 AbortController，便于用户中途取消
        let updateSource = localStorage.getItem('studio_update_source') || 'github';
        let projectUpdateNotes = null;

        function setSidebarPinned(pinned, options = {}) {
            const sidebar = document.getElementById('studioSidebar');
            const logo = document.getElementById('sidebarLogoToggle');
            if(!sidebar) return;
            pauseScaleInFrames();
            sidebar.classList.toggle('is-pinned', pinned);
            if(!pinned) {
                sidebar.classList.add('is-collapsing');
                window.setTimeout(() => sidebar.classList.remove('is-collapsing'), 360);
            } else {
                sidebar.classList.remove('is-collapsing');
            }
            if(logo) {
                logo.setAttribute('aria-pressed', pinned ? 'true' : 'false');
                logo.title = pinned ? '收起导航栏' : '固定导航栏';
            }
            if(!options.skipRemember) localStorage.setItem(SIDEBAR_PINNED_KEY, pinned ? '1' : '0');
        }

        function toggleSidebarPinned(event) {
            event?.preventDefault?.();
            event?.stopPropagation?.();
            const sidebar = document.getElementById('studioSidebar');
            setSidebarPinned(!sidebar?.classList.contains('is-pinned'));
        }

        function restoreSidebarPinned() {
            setSidebarPinned(localStorage.getItem(SIDEBAR_PINNED_KEY) === '1', { skipRemember:true });
        }

        function toggleMobileSidebar(forceOpen) {
            const sidebar = document.getElementById('studioSidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            if(!sidebar) return;
            const open = typeof forceOpen === 'boolean' ? forceOpen : !sidebar.classList.contains('mobile-open');
            sidebar.classList.toggle('mobile-open', open);
            backdrop?.classList.toggle('show', open);
        }

        function closeMobileSidebar() {
            toggleMobileSidebar(false);
        }

        function normalizePageId(id) {
            if(LEGACY_SETTINGS_MAP[id]) {
                try { localStorage.setItem(SETTINGS_TAB_KEY, LEGACY_SETTINGS_MAP[id]); } catch(e) {}
                return 'settings';
            }
            return PAGE_IDS.includes(id) ? id : DEFAULT_PAGE_ID;
        }

        function resolveNavTrigger(id) {
            if(TOOL_PAGE_IDS.includes(id)) return document.querySelector('[data-nav="tools"]');
            return document.querySelector(`[data-nav="${id}"]`) || document.querySelector(`[onclick*="'${id}'"],[onclick*='"${id}"']`);
        }

        function applyNavActive(el, id) {
            document.querySelectorAll('.nav-item,.side-pill').forEach(n => n.classList.remove('active'));
            if(el) {
                el.classList.add('active');
                return;
            }
            const trigger = resolveNavTrigger(id);
            if(trigger) trigger.classList.add('active');
        }

        function syncSettingsTab(tab) {
            const frame = document.getElementById('frame-settings');
            if(tab) {
                try { localStorage.setItem(SETTINGS_TAB_KEY, tab); } catch(e) {}
            }
            let activeTab = tab || localStorage.getItem(SETTINGS_TAB_KEY) || 'api';
            if (activeTab === 'appearance') activeTab = 'api';
            if(!frame) return;
            const send = () => {
                try { frame.contentWindow?.postMessage({ type:'studio-settings-set-tab', tab:activeTab }, '*'); } catch(e) {}
                broadcastSettingsInfo();
            };
            if(frame.contentWindow) send();
            else frame.addEventListener('load', send, { once:true });
        }

        function broadcastSettingsInfo() {
            const frame = document.getElementById('frame-settings');
            const store = document.getElementById('settings-entry-btn');
            if(!frame?.contentWindow) return;
            try {
                frame.contentWindow.postMessage({
                    type:'studio-settings-info',
                    version: appInfo.version || store?.dataset.localVersion || '',
                    remoteVersion: store?.dataset.remoteVersion || '',
                    available: !!store?.classList.contains('update-available')
                }, '*');
            } catch(e) {}
        }

        function handleSettingsAction(data) {
            if(!data || !data.action) return;
            switch(data.action) {
                case 'openProject': openProjectPage(); break;
                case 'checkUpdates': checkForUpdates(true); break;
                case 'runUpdate': runProjectUpdate(); break;
                case 'requestInfo': broadcastSettingsInfo(); break;
                case 'toggleTheme': toggleAppTheme(); break;
                case 'toggleLanguage': toggleAppLanguage(); break;
                default: break;
            }
        }

        function resetStudioRootScroll() {
            try {
                window.scrollTo(0, 0);
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            } catch(e) {}
        }

        function switchUI(el, id, options = {}) {
            resetStudioRootScroll();
            id = normalizePageId(id);
            if(!PAGE_IDS.includes(id)) id = DEFAULT_PAGE_ID;
            applyNavActive(el, id);
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
            const stage = document.querySelector('.stage');
            if (stage) stage.classList.toggle('is-settings', id === 'settings');
            const target = document.getElementById('frame-' + id);
            if(!target) return;
            target.classList.add('active');
            if (!target.src) target.src = target.dataset.src;
            if(!options.skipRemember) localStorage.setItem(ACTIVE_PAGE_KEY, id);
            syncThemeToFrame(target);
            syncLanguageToFrame(target);
            syncScaleToFrame(target);
            if(id === 'settings') syncSettingsTab(options.settingsTab);
            if(id === 'canvas' && target.src) {
                try { target.contentWindow?.postMessage({ type: 'canvas-focus' }, '*'); } catch(e) {}
            }
            closeMobileSidebar();
            resetStudioRootScroll();
        }

        function forwardStudioApiChange(data) {
            if(!data || !['providers-changed','workflows-changed','comfy-instances-changed'].includes(data.type)) return;
            document.querySelectorAll('iframe').forEach(iframe => {
                try {
                    if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                } catch(e) {}
            });
        }

        window.addEventListener('message', event => {
            if (event.origin && event.origin !== location.origin) return;
            const data = event.data || {};
            if(data.type === 'studio-navigate' && PAGE_IDS.includes(data.page)) {
                switchUI(null, data.page);
                return;
            }
            if(data.type === 'studio-settings-action') {
                handleSettingsAction(data);
                return;
            }
            forwardStudioApiChange(data);
        });

        try {
            const studioApiChannel = new BroadcastChannel('studio-api');
            studioApiChannel.onmessage = event => forwardStudioApiChange(event.data);
        } catch(e) {}

        function restoreActivePage() {
            restoreSidebarPinned();
            const saved = localStorage.getItem(ACTIVE_PAGE_KEY);
            const id = normalizePageId(saved);
            const trigger = resolveNavTrigger(id);
            switchUI(trigger, id, { skipRemember:true, settingsTab: localStorage.getItem(SETTINGS_TAB_KEY) || undefined });
            document.documentElement.classList.remove('studio-route-booting');
        }
        document.addEventListener('DOMContentLoaded', restoreActivePage, { once:true });

        async function syncStatus() {
            try {
                const res = await fetch(`/api/queue_status?client_id=${CID}`);
                const data = await res.json();
                const monitor = document.getElementById('nano-monitor');
                const queueVal = document.getElementById('queue-val');
                const logoDot = document.getElementById('logo-dot');
                const total = data.total || 0;
                const pos = data.position || 0;
                if (pos > 0) {
                    monitor?.classList.add('is-busy');
                    if (queueVal) queueVal.innerText = `${pos}/${total}`;
                    if (logoDot) logoDot.style.backgroundColor = '#3b82f6';
                } else {
                    monitor?.classList.remove('is-busy');
                    if (queueVal) queueVal.innerText = total > 0 ? total : '0';
                    if (logoDot) logoDot.style.backgroundColor = 'var(--text)';
                }
            } catch (e) { }
        }

        const host = window.location.host;
        if (host) {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${host}/ws/stats?client_id=${CID}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'stats') {
                    const ov = document.getElementById('online-val');
                    if (ov) ov.innerText = data.online_count;
                } else if (data.type === 'cloud_status') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'canvas_updated') {
                    const iframe = document.querySelector('iframe.active');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage(data, '*');
                    }
                } else if (data.type === 'asset_library_updated') {
                    document.querySelectorAll('iframe').forEach(iframe => {
                        if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(data, '*');
                    });
                }
            };
            setInterval(syncStatus, 2000);
        }

        // --- 夜间模式 ---

        function syncThemeToFrame(iframe) {
            const theme = (window.StudioTheme || {get: () => 'light'}).get();
            try {
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'studio-theme', theme }, '*');
                }
            } catch (e) {}
        }

        function syncScaleToFrame(iframe) {
            const mode = (window.StudioScale || {getMode: () => 'auto'}).getMode();

        function versionParts(value) {
            return String(value || '').match(/\d+/g)?.map(Number) || [];
        }

        function compareVersions(a, b) {
            const aa = versionParts(a);
            const bb = versionParts(b);
            const len = Math.max(aa.length, bb.length);
            for(let i = 0; i < len; i++){
                const diff = (aa[i] || 0) - (bb[i] || 0);
                if(diff) return diff;
            }
            return String(a || '').trim() === String(b || '').trim() ? 0 : 1;
        }

        function compactVersion(value) {
            const text = String(value || '').trim();
            const parts = text.match(/\d+/g) || [];
            if(parts.length >= 3) return `${parts[1]}.${parts[2]}`;
            return text.replace(/^v/i, '') || '-';
        }

        function versionLabel(value, mode = 'full') {
            const text = String(value || '').trim();
            if(!text) return 'v-';
            return mode === 'compact' ? `v${compactVersion(text)}` : `v${text.replace(/^v/i, '')}`;
        }

                compactSpan.textContent = versionLabel(version, 'compact');
                const fullSpan = document.createElement('span');
                fullSpan.className = 'project-version-full';
                fullSpan.textContent = full;
                badge.append(compactSpan, fullSpan);
            } else {

                ? `Current version: ${full} · click to check for updates`
                : `当前版本：${full} · 点击检测更新`;

        function sourceConnectivityStats(source, results = []) {
            const sourceItems = (results || []).filter(item => item.source === source);
            const required = sourceItems.filter(item => item.required);
            const okRequired = required.length ? required.every(item => item.ok) : false;
            const okItems = sourceItems.filter(item => item.ok);
            const avg = okItems.length
                ? Math.round(okItems.reduce((sum, item) => sum + Number(item.elapsed_ms || 0), 0) / okItems.length)
                : 999999;
            return {source, ok:okRequired, avg, okItems:okItems.length, total:sourceItems.length};
        }

        function bestUpdateSourceFromConnectivity(data) {
            const results = data?.results || [];
            const github = sourceConnectivityStats('github', results);
            const ms = sourceConnectivityStats('modelscope', results);
            if(github.ok && ms.ok) return ms.avg < github.avg ? 'modelscope' : 'github';
            if(ms.ok) return 'modelscope';
            if(github.ok) return 'github';
            return updateSource;
        }

        let connectivityTesting = false;
        async function runUpdateConnectivityTest() {
            if(connectivityTesting) return; // 防止重复点击导致状态错乱
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const btn = document.getElementById('connectivity-test-btn');
            const text = document.getElementById('connectivity-test-text');
            connectivityTesting = true;
            if(btn) btn.disabled = true;
            if(text) text.textContent = isEn ? 'Testing...' : '检测中...';
            updateConnectivityResult = null;

            const targets = updateConnectivityTargets();
            // 实时状态数组：先全部置为「检测中」，每条探测完成立即刷新对应行
            const live = targets.map(item => ({...item, pending:true, untouched:false}));
            let backendMissing = false;
            const applyResult = (name, patch) => {
                const i = live.findIndex(x => x.name === name);
                if(i < 0) return;
                live[i] = {...live[i], pending:false, untouched:false, ...patch};
                renderConnectivityList(live);
                renderSourceBadgesLive(live);
            };

            const probeOne = async (t) => {
                // 客户端兜底超时：5s 探测 + 1s 网络余量，超时即报「超时」，不会永远卡在「检测中」
                const ac = new AbortController();
                const killer = setTimeout(() => ac.abort(), 6000);
                try {
                    const res = await fetch(`/api/update-connectivity/probe?name=${encodeURIComponent(t.name)}`, { cache:'no-store', signal:ac.signal });
                    const data = await res.json().catch(() => ({}));
                    // 旧后端没有单条探测接口 → 404 Not Found，标记后回退到整体接口
                    if(res.status === 404 && (data.detail === 'Not Found' || data.detail === undefined)) {
                        backendMissing = true;
                        return;
                    }
                    if(res.ok) {
                        applyResult(t.name, { ok:!!data.ok, status:data.status || 0, elapsed_ms:data.elapsed_ms || 0, error:data.error || '', timed_out:!!data.timed_out });
                    } else {
                        applyResult(t.name, { ok:false, error:data.detail || (isEn ? 'Failed' : '失败') });
                    }
                } catch(e) {
                    if(e && e.name === 'AbortError') {
                        applyResult(t.name, { ok:false, timed_out:true, error:isEn ? 'Timed out (over 5s)' : '连接超时（超过 5s）' });
                    } else {
                        applyResult(t.name, { ok:false, error:describeNetworkError(e, isEn) });
                    }
                } finally {
                    clearTimeout(killer);
                }
            };

            try {
                setUpdateSummary('warn', isEn ? 'Testing connectivity' : '正在测试连通性', isEn ? 'Probing each endpoint — results stream in live.' : '正在逐条检测各节点，结果实时显示。');
                renderConnectivityList(live);
                renderSourceBadgesLive(live);
                await Promise.all(targets.map(probeOne));

                if(backendMissing) {
                    // 兜底：尝试旧的整体接口
                    try {
                        const res = await fetch('/api/update-connectivity', { cache:'no-store' });
                        const data = await res.json().catch(() => ({}));
                        if(res.ok && Array.isArray(data.results)) {
                            updateConnectivityResult = data;
                            setUpdateSource(bestUpdateSourceFromConnectivity(data));
                            return;
                        }
                    } catch(e) {}
                    const message = isEn
                        ? 'The backend has not loaded the new connectivity-test API yet. Restart the backend service, then test again.'
                        : '后端还没有加载新的连通性测试接口。请重启服务后再测试。';
                    updateConnectivityResult = {
                        ok:false,
                        backend_missing:true,
                        results:targets.map(item => ({...item, ok:false, elapsed_ms:0, error:message })),
                    };
                    return;
                }

                const results = live.map(({pending, untouched, ...rest}) => rest);
                const sources = computeConnectivitySources(results);
                updateConnectivityResult = { results, sources, ok:sources.github.ok };
                setUpdateSource(bestUpdateSourceFromConnectivity(updateConnectivityResult));
            } finally {
                connectivityTesting = false;
                if(btn) btn.disabled = false;
                refreshProjectUpdateModalText();
            }
        }

        async function confirmProjectUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const btn = document.getElementById('update-now-btn');
            const text = document.getElementById('update-now-text');
            const confirmBtn = document.getElementById('project-update-confirm-btn');
            const confirmText = document.getElementById('project-update-confirm-text');
            const testBtn = document.getElementById('connectivity-test-btn');
            const oldText = text?.textContent || '';
            projectUpdateRunning = true;
            if(btn) btn.disabled = true;
            if(confirmBtn) confirmBtn.disabled = true;
            if(testBtn) testBtn.disabled = true;
            if(text) text.textContent = isEn ? 'Updating...' : '更新中...';
            if(confirmText) confirmText.textContent = isEn ? 'Updating...' : '更新中...';
            const sourceName = updateSourceLabel();
            setUpdateSummary('warn', isEn ? 'Updating' : '正在更新', isEn ? `Downloading files from ${sourceName} and creating a local backup.` : `正在从 ${sourceName} 下载文件，并创建本地备份。`);
            // 客户端兜底超时：即使后端异常挂起，UI 也能恢复，不会永远停在「更新中」
            const ac = new AbortController();
            const killer = setTimeout(() => ac.abort(), 300000);
            try {
                const res = await fetch('/api/update-from-github', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ auto_restart:true, restart_delay:3, source:updateSource, fallback:true }),
                    signal:ac.signal
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Update failed' : '更新失败'));
                if(data.update_notes) setProjectUpdateNotes(data.update_notes);
                const restarting = data.restart_scheduled;
                const usedLabel = data.source_label || (data.source === 'modelscope' ? 'ModelScope' : 'GitHub');
                const fallbackNote = data.fallback_used
                    ? (isEn
                        ? ` (${sourceName} was unreachable, so it fell back to ${usedLabel})`
                        : `（${sourceName} 不可用，已自动兜底切换到 ${usedLabel}）`)
                    : '';
                setUpdateSummary(
                    'ok',
                    isEn ? 'Update complete' : '更新完成',
                    (restarting
                        ? (isEn
                            ? `Updated ${data.count || 0} files. The backend will restart in about 3 seconds; this page will reload when it returns.`
                            : `已更新 ${data.count || 0} 个文件。后端将在约 3 秒后自动重启，本页面会在恢复后自动刷新。`)
                        : (isEn
                            ? `Updated ${data.count || 0} files. Please restart the backend, then refresh this page.`
                            : `已更新 ${data.count || 0} 个文件。请重启后端，然后刷新页面。`)) + fallbackNote
                );
                document.getElementById('settings-entry-btn')?.classList.remove('update-available');
                btn?.classList.remove('show');
                setProjectVersionBadge(data.version || document.getElementById('settings-entry-btn')?.dataset.remoteVersion || appInfo.version);
                if(restarting) waitForBackendAndReload();
            } catch(e) {
                const msg = (e && e.name === 'AbortError')
                    ? (isEn ? 'Update timed out. Switch source or check your network, then retry.' : '更新超时。请切换下载源或检查网络后重试。')
                    : describeNetworkError(e, isEn);
                setUpdateSummary('fail', isEn ? 'Update failed' : '更新失败', msg);
            } finally {
                clearTimeout(killer);
                projectUpdateRunning = false;
                if(btn) btn.disabled = false;
                if(confirmBtn) confirmBtn.disabled = false;
                if(testBtn) testBtn.disabled = false;
                if(text) text.textContent = oldText || (isEn ? 'Update' : '一键更新');
                if(confirmText) confirmText.textContent = isEn ? 'Start update' : '开始更新';
                refreshUpdateButtonText();
            }
        }
        async function waitForBackendAndReload() {
            const deadline = Date.now() + 90 * 1000;
            await new Promise(r => setTimeout(r, 4000));
            while(Date.now() < deadline) {
                try {
                    const r = await fetch('/api/app-info', { cache:'no-store' });
                    if(r.ok) { location.reload(); return; }
                } catch {}
                await new Promise(r => setTimeout(r, 1500));
            }
        }
        async function rollbackProjectUpdate() {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            try {
                const list = await fetch('/api/update-backups').then(r => r.json());
                const backups = list.backups || [];
                if(!backups.length){ alert(isEn ? 'No backups available.' : '没有可用的备份'); return; }
                const lines = backups.slice(0, 8).map((b, i) => {
                    const d = new Date((b.created_at || 0) * 1000);
                    const ts = d.toLocaleString();
                    return `${i + 1}. ${b.name}  (${b.file_count} files, ${ts})`;
                });
                const promptMsg = (isEn
                    ? 'Select a backup to restore (enter the number):\n'
                    : '选择要还原的备份（输入序号）：\n') + lines.join('\n');
                const answer = prompt(promptMsg, '1');
                const idx = Number(answer) - 1;
                if(!(idx >= 0 && idx < backups.length)) return;
                const target = backups[idx];
                if(!confirm(isEn ? `Restore "${target.name}"? Backend will restart.` : `要还原 "${target.name}" 吗？后端会自动重启。`)) return;
                const res = await fetch('/api/update-rollback', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ name:target.name, auto_restart:true, restart_delay:3 })
                });
                const data = await res.json().catch(() => ({}));
                if(!res.ok) throw new Error(data.detail || (isEn ? 'Rollback failed' : '回滚失败'));
                alert(isEn
                    ? `Restored ${data.count || 0} files. Backend is restarting.`
                    : `已还原 ${data.count || 0} 个文件。后端正在重启。`);
                if(data.restart_scheduled) waitForBackendAndReload();
            } catch(e) {
                alert((isEn ? 'Rollback failed: ' : '回滚失败：') + describeNetworkError(e, isEn));
            }
        }
        window.rollbackProjectUpdate = rollbackProjectUpdate;

        async function checkForUpdates(manual = false) {
            const isEn = window.StudioI18n?.lang?.() === 'en';
            const badge = document.getElementById('project-version-badge');
            if(manual && badge) badge.classList.add('checking');
            try {
                const info = await fetch('/api/app-info', { cache:'no-store' }).then(r => r.json()).catch(() => ({}));
                mergeAppInfo(info);
                let current = String(appInfo.version || '').trim();
                setProjectVersionBadge(current);
                let best = null;
                let reachable = false;
                let serverChecked = false;
                // 优先走后端检测：服务端用系统代理同时检测 GitHub 和 ModelScope，避免浏览器跨域/被墙
                try {
                    const r = await fetch('/api/check-update', { cache:'no-store' });
                    if(r.ok) {
                        const d = await r.json();
                        serverChecked = true;
                        reachable = !!d.reachable;
                        if(d.current) { current = String(d.current).trim(); setProjectVersionBadge(current); }
                        if(d.latest?.version) best = {source:d.latest.source, version:d.latest.version, update_notes:d.latest.update_notes || d.update_notes || null};
                    }
                } catch(e) {}
                // 兜底：旧后端无 /api/check-update 时，浏览器直接拉取双源 VERSION
                if(!serverChecked) {
                    const sources = appInfo.sources || {};
                    const candidates = [
                        {source:'github', url:sources.github?.version_url || appInfo.version_url || ''},
                        {source:'modelscope', url:sources.modelscope?.version_url || ''},
                    ].filter(item => item.url);
                    for(const item of candidates) {
                        try {
                            const remoteText = await fetch(`${item.url}${item.url.includes('?') ? '&' : '?'}t=${Date.now()}`, { cache:'no-store' }).then(r => r.ok ? r.text() : '');
                            const remote = String(remoteText || '').trim().split(/\r?\n/)[0].trim();
                            if(remote){ reachable = true; if(!best || compareVersions(remote, best.version) > 0) best = {source:item.source, version:remote}; }
                        } catch(e) {}
                    }
                }
                const hasUpdate = !!(current && best?.version && compareVersions(best.version, current) > 0);
                if(hasUpdate) {
                    if(best.source === 'modelscope') setUpdateSource('modelscope');
                    setProjectUpdateNotes(best.update_notes || null);
                    showUpdateNotice(current, best.version);
                }
                if(manual) {
                    if(hasUpdate) {
                        openProjectUpdateModal();
                    } else if(reachable) {
                        alert(isEn ? `You are on the latest version (${versionLabel(current)}).` : `已是最新版本（${versionLabel(current)}）。`);
                    } else {
                        alert(isEn ? 'Could not reach GitHub or ModelScope. Check your network/proxy and try again.' : '无法连接 GitHub 或 ModelScope 更新源，请检查网络或代理后重试。');
                    }
                }
            } catch(e) {
                // 离线包里没有网络时保持安静，不影响本地使用。
                if(manual) alert(isEn ? 'Update check failed.' : '检测更新失败。');
            } finally {
                if(badge) badge.classList.remove('checking');
                broadcastSettingsInfo();
            }
        }
    </script>
