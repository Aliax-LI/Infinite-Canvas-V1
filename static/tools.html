<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <script>
        (function(){
            try {
                document.documentElement.dataset.studioScale = 'off';
                document.documentElement.dataset.studioFitScale = 'off';
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.6.1783517078"></script>
    <script src="/static/js/theme.js?v=2026.07.6.1783517078"></script>
    <script src="/static/js/i18n.js?v=2026.07.6.1783517078"></script>
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.6.1783517078">
    <link rel="stylesheet" href="/static/css/tools.css?v=2026.07.6.1783517078">
</head>
<body>
    <div class="tools-page">
        <header class="tools-head">
            <h1 class="tools-title" data-i18n="tools.title">工具箱</h1>
            <p class="tools-sub" data-i18n="tools.subtitle">本地 ComfyUI 工具与素材管理，集中入口、按需打开。</p>
        </header>

        <div class="tools-grid">
            <button class="tool-card" type="button" data-page="zimage">
                <div class="tool-icon"><i data-lucide="image"></i></div>
                <div class="tool-name" data-i18n="nav.textToImage">文生图</div>
                <div class="tool-desc" data-i18n="tools.textToImageDesc">本地文生图与提示词创作</div>
                <span class="tool-tag" data-i18n="tools.tagLocal">本地</span>
            </button>
            <button class="tool-card" type="button" data-page="enhance">
                <div class="tool-icon"><i data-lucide="zap"></i></div>
                <div class="tool-name" data-i18n="nav.enhance">细节增强</div>
                <div class="tool-desc" data-i18n="tools.enhanceDesc">超分与细节修复</div>
                <span class="tool-tag" data-i18n="tools.tagLocal">本地</span>
            </button>
            <button class="tool-card" type="button" data-page="klein">
                <div class="tool-icon"><i data-lucide="pen-line"></i></div>
                <div class="tool-name" data-i18n="nav.imageEdit">图片编辑</div>
                <div class="tool-desc" data-i18n="tools.imageEditDesc">局部编辑与 Klein 流程</div>
                <span class="tool-tag" data-i18n="tools.tagLocal">本地</span>
            </button>
            <button class="tool-card" type="button" data-page="angle">
                <div class="tool-icon"><i data-lucide="box"></i></div>
                <div class="tool-name" data-i18n="nav.angle">角度控制</div>
                <div class="tool-desc" data-i18n="tools.angleDesc">相机视角与角度生成</div>
                <span class="tool-tag" data-i18n="tools.tagLocal">本地</span>
            </button>
            <button class="tool-card" type="button" data-page="asset-manager">
                <div class="tool-icon"><i data-lucide="folder-open"></i></div>
                <div class="tool-name" data-i18n="nav.assetManager">素材库</div>
                <div class="tool-desc" data-i18n="tools.assetsDesc">管理图片与画布素材</div>
                <span class="tool-tag" data-i18n="tools.tagLibrary">资源</span>
            </button>
        </div>
    </div>
    <script>
        (function(){
            const TOOL_PAGES = ['zimage','enhance','klein','angle','asset-manager'];
            function openTool(page) {
                if (!TOOL_PAGES.includes(page)) return;
                try {
                    window.parent?.postMessage({ type: 'studio-navigate', page }, '*');
                } catch (e) {}
            }
            document.querySelectorAll('.tool-card').forEach(card => {
                card.addEventListener('click', () => openTool(card.dataset.page));
            });
            window.addEventListener('message', (event) => {
                if (event.origin && event.origin !== location.origin) return;
                const data = event.data || {};
                if (data.type === 'studio-theme' && window.StudioTheme) window.StudioTheme.set(data.theme);
                if (data.type === 'studio-lang') {
                    window.StudioI18n?.set?.(data.lang);
                    window.StudioI18n?.apply?.();
                }
            });
            window.addEventListener('DOMContentLoaded', () => {
                if (window.StudioI18n) window.StudioI18n.apply();
                if (window.lucide) lucide.createIcons();
            });
        })();
    </script>
</body>
</html>
